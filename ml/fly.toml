app = "cv-ml-service"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8001"

[[services]]
  http_checks = []
  internal_port = 8001
  protocol = "tcp"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

[[services.http_checks]]
  interval = "15s"
  grace_period = "30s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 4
  memory_mb = 4096
